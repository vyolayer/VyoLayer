root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/gateway ./cmd/gateway/main.go"
bin = "./tmp/gateway"
full_bin = ""
include_ext = ["go", "tpl", "tmpl", "html", "env", "yaml", "yml"]
include_dir = ["cmd/gateway", "internal/gateway", "internal/shared", "pkg"]
include_file = [".env"]
exclude_dir = ["assets", "tmp", "vendor", "node_modules", ".git"]
exclude_file = []
exclude_regex = ["_test\\.go"]
exclude_unchanged = false
follow_symlink = false
log = "air.gateway.build.log"
delay = 500
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"

[log]
time = true

[misc]
clean_on_exit = true
