syntax = "proto3";

package iam.v1;

option go_package = "github.com/vyolayer/vyolayer/proto/iam/v1;iAMV1";

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "iam/v1/common.proto";

service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc VerifyEmail(VerifyEmailRequest) returns (IAMSuccessResponse);
  rpc ResendVerificationEmail(ResendVerificationEmailRequest) returns (IAMSuccessResponse);

  rpc RefreshSession(RefreshSessionRequest) returns (SessionTokenResponse);
  rpc Login(LoginRequest) returns (SessionTokenResponse);
  rpc Logout(LogoutRequest) returns (IAMSuccessResponse);

  rpc ChangePassword(ChangePasswordRequest) returns (IAMSuccessResponse);
  rpc ForgotPassword(ForgotPasswordRequest) returns (IAMSuccessResponse);
  rpc ResetPassword(ResetPasswordRequest) returns (IAMSuccessResponse);
}

message RegisterRequest {
  string email      = 1 [(buf.validate.field).string.email = true];
  string password   = 2 [(buf.validate.field).string = {max_len: 20}];
  string full_name  = 3 [(buf.validate.field).string = {max_len: 50}];
}

message RegisterResponse {
  string user_id    = 1;
  string email      = 2 [(buf.validate.field).string.email = true];
  string full_name  = 3 [(buf.validate.field).string = {max_len: 100}];
}

message VerifyEmailRequest {
  string token = 1 [(buf.validate.field).string.min_len = 1];
}

message ResendVerificationEmailRequest {
  string email = 1 [(buf.validate.field).string.email = true];
}

message RefreshSessionRequest {
  string session_token = 1 [(buf.validate.field).string.min_len = 1];
}

message LoginRequest {
  string email    = 1 [(buf.validate.field).string.email = true];
  string password = 2 [(buf.validate.field).string = {min_len: 8, max_len: 20}];
}

message SessionTokenResponse {
  string session_token = 1 [(buf.validate.field).string.min_len = 1];
  google.protobuf.Timestamp session_token_expires_at = 2;
  string access_token  = 3 [(buf.validate.field).string.min_len = 1];
  google.protobuf.Timestamp access_token_expires_at = 4;
}

message LogoutRequest {
  string session_token = 1 [(buf.validate.field).string.min_len = 1];
}

message ChangePasswordRequest {
  string old_password = 1 [(buf.validate.field).string.min_len = 1];
  string new_password = 2 [(buf.validate.field).string = {
    min_len: 8,
    max_len: 20
  }];
  string confirm_password = 3 [(buf.validate.field).string.min_len = 1];
}

message ForgotPasswordRequest {
  string email = 1 [(buf.validate.field).string.email = true];
}

message ResetPasswordRequest {
  string token        = 2 [(buf.validate.field).string.min_len = 1];
  string new_password = 3 [(buf.validate.field).string = {
    min_len: 8,
    max_len: 20
  }];
  string confirm_password = 4 [(buf.validate.field).string.min_len = 1];
}
