syntax = "proto3";

package iam.v1;

option go_package = "github.com/vyolayer/vyolayer/proto/iam/v1;iAMV1";

import "buf/validate/validate.proto";

service UserService {
  rpc GetMe (GetMeRequest) returns (GetMeResponse);
}

message GetMeRequest {}

message GetMeResponse {
  User user = 1;
}

message User {
  string id = 1;
  string full_name = 2;
  string email = 3;
  string status = 4; // "active" | "inactive"
  bool is_email_verified = 5;
  string joined_at = 6; // RFC3339 string
}

