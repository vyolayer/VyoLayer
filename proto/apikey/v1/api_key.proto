syntax = "proto3";

package apikey.v1;

import "google/protobuf/timestamp.proto";
import "buf/validate/validate.proto";

option go_package = "github.com/vyolayer/vyolayer/proto/apikey/v1;apikeyv1";

/*
 ==================================================
 API Key Service
 ==================================================
 */

service APIKeyService {
  rpc CreateAPIKey(CreateAPIKeyRequest)
  returns (CreateAPIKeyResponse);

  rpc ListAPIKeys(ListAPIKeysRequest)
  returns (ListAPIKeysResponse);

  rpc GetAPIKey(GetAPIKeyRequest)
  returns (GetAPIKeyResponse);

  rpc UpdateAPIKey(UpdateAPIKeyRequest)
  returns (UpdateAPIKeyResponse);

  rpc RevokeAPIKey(RevokeAPIKeyRequest)
  returns (RevokeAPIKeyResponse);

  rpc RotateAPIKey(RotateAPIKeyRequest)
  returns (RotateAPIKeyResponse);

  rpc ValidateAPIKey(ValidateAPIKeyRequest)
  returns (ValidateAPIKeyResponse);

  rpc ListAPIKeyAuditLogs(ListAPIKeyAuditLogsRequest)
  returns (ListAPIKeyAuditLogsResponse);
}

/*
 ==================================================
 Enums
 ==================================================
 */

// enum APIKeyEnvironment {
//   DEV  = 0;
//   LIVE = 1;
// }

// enum APIKeyStatus {
//   UNSPECIFIED = 0;
//   ACTIVE      = 1;
//   REVOKED     = 2;
//   EXPIRED     = 3;
//   DISABLED    = 4;
