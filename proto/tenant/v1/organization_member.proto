syntax = "proto3";

package tenant.v1;

import "buf/validate/validate.proto";
import "tenant/v1/common.proto";
import "tenant/v1/organization_options.proto";

option go_package = "github.com/vyolayer/vyolayer/proto/tenant/v1;tenantV1";

service OrganizationMemberService {
  // No permission needed—if they pass the standard interceptor, they are a member and can view themselves.
  rpc GetCurrentMember(TenantOrganizationIDRequest) returns (OrganizationMemberWithRBACResponse);

  rpc GetAllMembersByOrg(TenantOrganizationIDRequest) returns (ListOrganizationMembersResponse) {
    option (tenant.v1.required_org_permission) = "member.list";
  };
  rpc GetMemberById(GetOrganizationMemberByIdRequest) returns (OrganizationMemberResponse) {
    option (tenant.v1.required_org_permission) = "member.view";
  };
  rpc RemoveMember(RemoveOrganizationMemberRequest) returns (TenantSuccessResponse) {
    option (tenant.v1.required_org_permission) = "member.remove";
  };
  rpc ChangeMemberRole(ChangeOrganizationMemberRoleRequest) returns (TenantSuccessResponse) {
    option (tenant.v1.required_org_permission) = "member.update";
  };
}

// --------------------
// Member Requests
// --------------------
message GetOrganizationMemberByIdRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
  string member_id       = 2 [(buf.validate.field).string.min_len = 1];
}

message RemoveOrganizationMemberRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
  string member_id       = 2 [(buf.validate.field).string.min_len = 1];
}

message ChangeOrganizationMemberRoleRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
  string member_id       = 2 [(buf.validate.field).string.min_len = 1];
  string role_id         = 3 [(buf.validate.field).string.min_len = 1];
}

// --------------------
// Member Responses
// --------------------
message ListOrganizationMembersResponse {
  repeated OrganizationMember members         = 1;
  int32                       total_count     = 2;
  string                      next_page_token = 3;
}

message OrganizationMemberWithRBACResponse {
  OrganizationMember              member      = 1;
  repeated OrganizationRole       roles       = 2;
  repeated OrganizationPermission permissions = 3;
}

message OrganizationMemberResponse {
  OrganizationMember member = 1;
}

// --------------------
// Member Messages
// --------------------
message OrganizationMember {
  string id        = 1;
  string user_id   = 2;
  string email     = 3;
  string full_name = 4;
  string status    = 5;
  string joined_at = 6; // RFC3339 string

  optional string invited_by = 7;
  optional string invited_at = 8;

  optional string deactivated_by = 9;
  optional string deactivated_at = 10;

  repeated OrganizationRole roles = 11;
}
