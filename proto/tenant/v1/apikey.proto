syntax = "proto3";

package tenant.v1;

import "buf/validate/validate.proto";
import "tenant/v1/common.proto";

option go_package = "github.com/vyolayer/vyolayer/proto/tenant/v1;tenantV1";

service ApiKeyService {
  rpc GenerateKey(GenerateKeyRequest) returns (ApiKeyCreatedResponse);
  rpc ListKeys(ListKeysRequest) returns (ListApiKeysResponse);
  rpc GetKey(GetKeyRequest) returns (ApiKeyResponse);
  rpc RevokeKey(RevokeKeyRequest) returns (TenantSuccessResponse);
}

message GenerateKeyRequest {
  string project_id = 1 [(buf.validate.field).string.min_len = 1];
  string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];
  string mode = 3 [(buf.validate.field).string = {
    min_len: 1
    pattern: "^(dev|live)$"
  }]; // "dev" | "live"
}

message ListKeysRequest {
  string project_id = 1 [(buf.validate.field).string.min_len = 1];
  int32 page_size = 2 [(buf.validate.field).int32 = {
    gte: 0
    lte: 100
  }];
  string page_token = 3 [(buf.validate.field).string.max_len = 256];
}

message GetKeyRequest {
  string project_id = 1 [(buf.validate.field).string.min_len = 1];
  string api_key_id = 2 [(buf.validate.field).string.min_len = 1];
}

message RevokeKeyRequest {
  string project_id = 1 [(buf.validate.field).string.min_len = 1];
  string api_key_id = 2 [(buf.validate.field).string.min_len = 1];
}

message ApiKeyResponse {
  ApiKey api_key = 1;
}

message ApiKeyCreatedResponse {
  ApiKey api_key = 1;
  string raw_key = 2;
}

message ListApiKeysResponse {
  repeated ApiKey api_keys        = 1;
  int32           total_count     = 2;
  string          next_page_token = 3;
}

message ApiKey {
  string          id            = 1;
  string          project_id    = 2;
  string          name          = 3;
  string          key_prefix    = 4;
  string          mode          = 5;
  string          created_by    = 6;
  optional string expires_at    = 7;
  optional string last_used_at  = 8;
  bool            is_revoked    = 9;
  optional string revoked_at    = 10;
  int32           request_limit = 11;
  int32           rate_limit    = 12;
  string          created_at    = 13; // RFC3339
}
