syntax = "proto3";

package tenant.v1;

import "buf/validate/validate.proto";
import "tenant/v1/common.proto";

option go_package = "github.com/vyolayer/vyolayer/proto/tenant/v1;tenantV1";

service OrganizationService {
  rpc CreateOrganization(CreateOrganizationRequest) returns (OrganizationResponse);
  rpc OnboardOrganization(CreateOrganizationRequest) returns (OrganizationResponse);
  rpc GetOrganizationById(GetOrganizationByIdRequest) returns (OrganizationResponse);
  rpc GetOrganizationBySlug(GetOrganizationBySlugRequest) returns (OrganizationResponse);
  rpc ListOrganizations(ListOrganizationsRequest) returns (ListOrganizationsResponse);
  rpc UpdateOrganization(UpdateOrganizationRequest) returns (OrganizationResponse);
  rpc ArchiveOrganization(OrganizationIdRequest) returns (TenantSuccessResponse);
  rpc RestoreOrganization(OrganizationIdRequest) returns (TenantSuccessResponse);
  rpc DeleteOrganization(DeleteOrganizationRequest) returns (TenantSuccessResponse);

  // Member-level
  rpc GetCurrentMember(OrganizationIdRequest) returns (OrganizationMemberWithRBACResponse);
  rpc LeaveOrganization(OrganizationIdRequest) returns (TenantSuccessResponse);
  rpc GetAllMembersByOrg(OrganizationIdRequest) returns (ListOrganizationMembersResponse);
  rpc GetMemberById(GetOrganizationMemberByIdRequest) returns (OrganizationMemberResponse);
  rpc RemoveMember(RemoveOrganizationMemberRequest) returns (TenantSuccessResponse);
  rpc ChangeMemberRole(ChangeOrganizationMemberRoleRequest) returns (TenantSuccessResponse);
  rpc TransferOwnership(TransferOwnershipRequest) returns (TenantSuccessResponse);

  // Invitations
  rpc CreateInvitation(CreateInvitationRequest) returns (OrganizationMemberInvitationResponse);
  rpc ListInvitations(ListInvitationsRequest) returns (ListOrganizationInvitationsResponse);
  rpc GetPendingInvitations(GetPendingInvitationsRequest) returns (ListOrganizationInvitationsResponse);
  rpc AcceptInvitation(AcceptInvitationRequest) returns (TenantSuccessResponse);
  rpc CancelInvitation(CancelInvitationRequest) returns (TenantSuccessResponse);
  rpc ResendInvitation(ResendInvitationRequest) returns (OrganizationMemberInvitationResponse);

  // RBAC
  rpc GetAllPermissions(OrganizationIdRequest) returns (ListOrganizationPermissionsResponse);
  rpc GetAllRoles(OrganizationIdRequest) returns (ListOrganizationRolesResponse);
}

message OrganizationIdRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
}

message CreateOrganizationRequest {
  string name = 1 [(buf.validate.field).string = {
    min_len: 3
    max_len: 50
  }];
  string description = 2 [(buf.validate.field).string.max_len = 250];
}

message UpdateOrganizationRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
  optional string name = 2 [(buf.validate.field).string = {
    min_len: 3
    max_len: 50
  }];
  optional string description = 3 [(buf.validate.field).string.max_len = 250];
}

message DeleteOrganizationRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
  string confirm_name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 50
  }];
}

message GetOrganizationByIdRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
}

message GetOrganizationBySlugRequest {
  string slug = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];
}

message ListOrganizationsRequest {
  int32 page_size = 1 [(buf.validate.field).int32 = {
    gte: 0
    lte: 100
  }];
  string page_token = 2 [(buf.validate.field).string.max_len = 256];
}

message ListOrganizationsResponse {
  repeated Organization organizations   = 1;
  int32                 total_count     = 2;
  string                next_page_token = 3;
}

// --------------------
// Membership & RBAC
// --------------------
message ListOrganizationMembersResponse {
  repeated OrganizationMember members         = 1;
  int32                       total_count     = 2;
  string                      next_page_token = 3;
}

message GetOrganizationMemberByIdRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
  string member_id       = 2 [(buf.validate.field).string.min_len = 1];
}

message RemoveOrganizationMemberRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
  string member_id       = 2 [(buf.validate.field).string.min_len = 1];
}

message ChangeOrganizationMemberRoleRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
  string member_id       = 2 [(buf.validate.field).string.min_len = 1];
  string role_id         = 3 [(buf.validate.field).string.min_len = 1];
}

message TransferOwnershipRequest {
  string organization_id     = 1 [(buf.validate.field).string.min_len = 1];
  string new_owner_member_id = 2 [(buf.validate.field).string.min_len = 1];
}

message OrganizationMemberWithRBACResponse {
  OrganizationMember              member      = 1;
  repeated OrganizationRole       roles       = 2;
  repeated OrganizationPermission permissions = 3;
}

message OrganizationMemberResponse {
  OrganizationMember member = 1;
}

message OrganizationMember {
  string id        = 1;
  string user_id   = 2;
  string email     = 3;
  string full_name = 4;
  bool   is_active = 5;
  string joined_at = 6; // RFC3339 string

  optional string invited_by = 7;
  optional string invited_at = 8;

  optional string deactivated_by = 9;
  optional string deactivated_at = 10;
}

message OrganizationRoleDTO {
  string id             = 1;
  string name           = 2;
  string description    = 3;
  bool   is_system_role = 4;
  bool   is_default     = 5;
}

message OrganizationPermissionDTO {
  string id        = 1;
  string resource  = 2;
  string action    = 3;
  string code      = 4;
  string group     = 5;
  bool   is_system = 6;
}

message OrganizationRole {
  string id             = 1;
  string name           = 2;
  string description    = 3;
  bool   is_system_role = 4;
  bool   is_default     = 5;
}

message OrganizationPermission {
  string id        = 1;
  string resource  = 2;
  string action    = 3;
  string code      = 4;
  string group     = 5;
  bool   is_system = 6;
}

message ListOrganizationRolesResponse {
  repeated OrganizationRole roles = 1;
}

message ListOrganizationPermissionsResponse {
  repeated OrganizationPermission permissions = 1;
}

// --------------------
// Invitations
// --------------------
message CreateInvitationRequest {
  string          organization_id = 1 [(buf.validate.field).string.min_len = 1];
  string          email           = 2 [(buf.validate.field).string.email = true];
  repeated string role_ids = 3 [(buf.validate.field).repeated = {
    items: {
      string: {min_len: 1}
    }
  }];
}

message ListInvitationsRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
  int32 page_size = 2 [(buf.validate.field).int32 = {
    gte: 0
    lte: 100
  }];
  string page_token = 3 [(buf.validate.field).string.max_len = 256];
}

message GetPendingInvitationsRequest {
  string email = 1 [(buf.validate.field).string.email = true];
}

message AcceptInvitationRequest {
  string token = 1 [(buf.validate.field).string.min_len = 1];
}

message CancelInvitationRequest {
  string invitation_id   = 1 [(buf.validate.field).string.min_len = 1];
  string organization_id = 2;
}

message ResendInvitationRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
  string invitation_id   = 2 [(buf.validate.field).string.min_len = 1];
}

message OrganizationMemberInvitationResponse {
  OrganizationMemberInvitation invitation = 1;
}

message ListOrganizationInvitationsResponse {
  repeated OrganizationMemberInvitation invitations     = 1;
  int32                                 total_count     = 2;
  string                                next_page_token = 3;
}

message OrganizationMemberInvitation {
  string          id              = 1;
  string          organization_id = 2;
  string          invited_by      = 3;
  string          email           = 4;
  repeated string role_ids        = 5;
  string          invited_at      = 6; // RFC3339
  bool            is_accepted     = 7;
  optional string accepted_at     = 8;
  string          expired_at      = 9; // RFC3339
  bool            is_pending      = 10;
}

// --------------------
// Organization
// --------------------
message OrganizationResponse {
  Organization                organization = 1;
  repeated OrganizationMember members      = 2;
}

message Organization {
  string id          = 1;
  string name        = 2;
  string slug        = 3;
  string description = 4;
  string owner_id    = 5;
  bool   is_active   = 6;

  int32 max_projects  = 7;
  int32 project_count = 8;
  int32 max_members   = 9;
  int32 member_count  = 10;

  optional string deactivated_by = 11;
  optional string deactivated_at = 12;
  string          created_at     = 13; // RFC3339
  string          updated_at     = 14; // RFC3339
}
