syntax = "proto3";

package tenant.v1;

import "buf/validate/validate.proto";
import "tenant/v1/common.proto";
import "tenant/v1/organization_options.proto";


option go_package = "github.com/vyolayer/vyolayer/proto/tenant/v1;tenantV1";

option go_package = "github.com/vyolayer/vyolayer/proto/tenant/v1;tenantV1";

service ProjectService {
  // Project CRUD
  rpc CreateProject(CreateProjectRequest) returns (ProjectResponse) {
    option (tenant.v1.required_org_permission) = "project.create";
  };
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse) {
    option (tenant.v1.required_org_permission) = "project.read";
  };
  rpc GetProject(GetProjectRequest) returns (ProjectResponse) {
    option (tenant.v1.required_org_permission) = "project.read";
    option (tenant.v1.required_project_permission) = "project.read";
  };
  rpc UpdateProject(UpdateProjectRequest) returns (ProjectResponse) {
    option (tenant.v1.required_org_permission) = "project.update";
    option (tenant.v1.required_project_permission) = "project.update";
  };
  // rpc ArchiveProject(ArchiveProjectRequest) returns (TenantSuccessResponse) {
  //   option (tenant.v1.required_org_permission) = "project.delete";
  //   option (tenant.v1.required_project_permission) = "project.delete";
  // };
  // rpc RestoreProject(RestoreProjectRequest) returns (TenantSuccessResponse) {
  //   option (tenant.v1.required_org_permission) = "project.delete";
  //   option (tenant.v1.required_project_permission) = "project.delete";
  // };
  rpc DeleteProject(DeleteProjectRequest) returns (TenantSuccessResponse) {
    option (tenant.v1.required_org_permission) = "project.delete";
    option (tenant.v1.required_project_permission) = "project.delete";
  };

  // Members
  rpc ListMembers(ListProjectMembersRequest) returns (ListProjectMembersResponse) {
    option (tenant.v1.required_org_permission) = "project.read";
    option (tenant.v1.required_project_permission) = "project.read";
  };
  rpc GetMember(GetProjectMemberRequest) returns (ProjectMemberResponse) {
    option (tenant.v1.required_org_permission) = "project.read";
    option (tenant.v1.required_project_permission) = "project.read";
  };
  rpc GetCurrentMember(ListProjectMembersRequest) returns (ProjectMemberResponse) {
    option (tenant.v1.required_org_permission) = "project.read";
    option (tenant.v1.required_project_permission) = "project.read";
  };
  rpc AddMember(AddProjectMemberRequest) returns (ProjectMemberResponse) {
    option (tenant.v1.required_org_permission) = "project.update";
    option (tenant.v1.required_project_permission) = "project.update";
  };
  rpc ChangeMemberRole(ChangeProjectMemberRoleRequest) returns (TenantSuccessResponse) {
    option (tenant.v1.required_org_permission) = "project.update";
    option (tenant.v1.required_project_permission) = "project.update";
  };
  rpc RemoveMember(RemoveProjectMemberRequest) returns (TenantSuccessResponse) {
    option (tenant.v1.required_org_permission) = "project.delete";
    option (tenant.v1.required_project_permission) = "project.delete";
  };
  rpc LeaveProject(ProjectIdRequest) returns (TenantSuccessResponse) {
    option (tenant.v1.required_org_permission) = "project.delete";
    option (tenant.v1.required_project_permission) = "project.delete";
  };
}

// --------------------
// Project CRUD
// --------------------
message CreateProjectRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
  string name = 2 [(buf.validate.field).string = {
    min_len: 3
    max_len: 50
  }];
  string description = 3 [(buf.validate.field).string.max_len = 500];
}

message ListProjectsRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
  int32 page_size = 2 [(buf.validate.field).int32 = {
    gte: 0
    lte: 100
  }];
  string page_token = 3 [(buf.validate.field).string.max_len = 256];
}

message ListProjectsResponse {
  repeated Project projects        = 1;
  int32            total_count     = 2;
  string           next_page_token = 3;
}

message GetProjectRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
  string project_id      = 2 [(buf.validate.field).string.min_len = 1];
}

message UpdateProjectRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
  string project_id      = 2 [(buf.validate.field).string.min_len = 1];
  optional string name = 3 [(buf.validate.field).string = {
    min_len: 3
    max_len: 100
  }];
  optional string description = 4 [(buf.validate.field).string.max_len = 500];
}

// message ArchiveProjectRequest {
//   string organization_id = 1 [(buf.validate.field).string.min_len = 1];
//   string project_id      = 2 [(buf.validate.field).string.min_len = 1];
// }

// message RestoreProjectRequest {
//   string organization_id = 1 [(buf.validate.field).string.min_len = 1];
//   string project_id      = 2 [(buf.validate.field).string.min_len = 1];
// }

message DeleteProjectRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
  string project_id      = 2 [(buf.validate.field).string.min_len = 1];
  string confirm_name = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];
}

message ProjectIdRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
  string project_id      = 2 [(buf.validate.field).string.min_len = 1];
}

message ProjectResponse {
  Project                project = 1;
  repeated ProjectMember members = 2;
}

message Project {
  string id              = 1;
  string organization_id = 2;
  string name            = 3;
  string slug            = 4;
  string description     = 5;
  bool   is_active       = 6;
  string created_by      = 7;
  uint32  max_api_keys    = 8;
  uint32  max_members     = 9;
  uint32  member_count    = 10;
  string created_at      = 11; // RFC3339
}

// --------------------
// Project Members
// --------------------
message ListProjectMembersRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
  string project_id      = 2 [(buf.validate.field).string.min_len = 1];
  int32 page_size = 3 [(buf.validate.field).int32 = {
    gte: 0
    lte: 100
  }];
  string page_token = 4 [(buf.validate.field).string.max_len = 256];
}

message ListProjectMembersResponse {
  repeated ProjectMember members         = 1;
  int32                  total_count     = 2;
  string                 next_page_token = 3;
}

message GetProjectMemberRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
  string project_id      = 2 [(buf.validate.field).string.min_len = 1];
  string member_id       = 3 [(buf.validate.field).string.min_len = 1];
}

message ProjectMemberResponse {
  ProjectMember member = 1;
}

message ProjectMember {
  string          id         = 1;
  string          user_id    = 2;
  string          email      = 3;
  string          full_name  = 4;
  string          role       = 5;
  bool            is_active  = 6;
  string          joined_at  = 7; // RFC3339
  optional string removed_at = 8;
}

message AddProjectMemberRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
  string project_id      = 2 [(buf.validate.field).string.min_len = 1];
  string user_id         = 3 [(buf.validate.field).string.min_len = 1];
  string role            = 4 [(buf.validate.field).string.min_len = 1];
}

message ChangeProjectMemberRoleRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
  string project_id      = 2 [(buf.validate.field).string.min_len = 1];
  string member_id       = 3 [(buf.validate.field).string.min_len = 1];
  string role            = 4 [(buf.validate.field).string.min_len = 1];
}

message RemoveProjectMemberRequest {
  string organization_id = 1 [(buf.validate.field).string.min_len = 1];
  string project_id      = 2 [(buf.validate.field).string.min_len = 1];
  string member_id       = 3 [(buf.validate.field).string.min_len = 1];
}
