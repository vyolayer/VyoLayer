syntax = "proto3";

package account.v1;
option go_package = "github.com/vyolayer/vyolayer/proto/account/v1;accountV1";

import "buf/validate/validate.proto";

service AccountService {
	rpc Register (RegisterRequest) returns (RegisterResponse);
  rpc VerifyEmail (VerifyEmailRequest) returns (VerifyEmailResponse);
  rpc ResendVerificationEmail (ResendVerificationEmailRequest) returns (ResendVerificationEmailResponse);
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc Logout (LogoutRequest) returns (LogoutResponse);

  // Sessions
  rpc AllSessions (AllSessionsRequest) returns (AllSessionsResponse);
  rpc RevokeSession (RevokeSessionRequest) returns (RevokeSessionResponse);
  rpc RevokeAllSessions (RevokeAllSessionsRequest) returns (RevokeAllSessionsResponse);
  rpc RefreshSession (RefreshSessionRequest) returns (RefreshSessionResponse);

  // Account recovery
  rpc ChangePassword (ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc ResetPassword (ResetPasswordRequest) returns (ResetPasswordResponse);
  rpc ForgotPassword (ForgotPasswordRequest) returns (ForgotPasswordResponse);
}

// RegisterRequest is the request for the Register RPC.
message RegisterRequest {
  string email = 1 [(buf.validate.field).string.email = true];
  string username = 2 [(buf.validate.field).string = {max_len: 20}];
  string password = 3 [(buf.validate.field).string = {min_len: 8, max_len: 20}];
  string first_name = 4 [(buf.validate.field).string = {min_len: 3, max_len: 50}];
  string last_name = 5 [(buf.validate.field).string = {max_len: 50}];
}

message RegisterResponse {
  string user_id = 1;
}

// VerifyEmailRequest is the request for the VerifyEmail RPC.
message VerifyEmailRequest {
  string token = 1 [(buf.validate.field).string = {min_len: 1}];
}

message VerifyEmailResponse {}

// ResendVerificationEmailRequest is the request for the ResendVerificationEmail RPC.
message ResendVerificationEmailRequest {
  string email = 1 [(buf.validate.field).string.email = true];
}

message ResendVerificationEmailResponse {}

// Login
message LoginRequest {
  string email = 1 [(buf.validate.field).string.email = true];
  string password = 2 [(buf.validate.field).string = {min_len: 8, max_len: 20}];
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
}

// Logout
message LogoutRequest {
  string refresh_token = 1 [(buf.validate.field).string = {min_len: 1}];
}

message LogoutResponse {}

// AllSessions
message AllSessionsRequest {
  string refresh_token = 1 [(buf.validate.field).string = {min_len: 1}];
}

message SessionData {
  string session_id = 1;
  string user_id = 2;
  string ip_address = 3;
  string user_agent = 4;
  string created_at = 5;
  string updated_at = 6;
}

message AllSessionsResponse {
  repeated SessionData sessions = 1;
}

// RevokeSession
message RevokeSessionRequest {
  string refresh_token = 1 [(buf.validate.field).string = {min_len: 1}];
  string session_id = 2 [(buf.validate.field).string = {min_len: 1}];
}

message RevokeSessionResponse {}

// RevokeAllSessions
message RevokeAllSessionsRequest {
  string refresh_token = 1 [(buf.validate.field).string = {min_len: 1}];
}

message RevokeAllSessionsResponse {}

// RefreshSession
message RefreshSessionRequest {
  string refresh_token = 1 [(buf.validate.field).string = {min_len: 1}];
}

message RefreshSessionResponse {
  string access_token = 1;
  string refresh_token = 2;
}

// ChangePasswordRequest 
message ChangePasswordRequest {
  string old_password = 1 [(buf.validate.field).string.min_len = 1];
  
  string new_password = 2 [(buf.validate.field).string = {
    min_len: 8, 
    max_len: 20
  }];
  
  string confirm_password = 3 [(buf.validate.field).string.min_len = 1];
}

message ChangePasswordResponse {
  string message = 1;
}

message ResetPasswordRequest {
  string token = 2 [(buf.validate.field).string.min_len = 1];
  
  string new_password = 3 [(buf.validate.field).string = {
    min_len: 8, 
    max_len: 20
  }];
  
  string confirm_password = 4 [(buf.validate.field).string.min_len = 1];
}

message ResetPasswordResponse {
  string message = 1;
}

message ForgotPasswordRequest {
  string email = 1 [(buf.validate.field).string.email = true];
}

message ForgotPasswordResponse {
  string message = 1;
}